<article class="post">
    
      <h1>Example Article Title</h1>
    
    
      <!-- Outer figure wraps entire article body (Medium layout) -->
      <figure class="paragraph-image">
        <div class="content-wrapper">
          <p>First paragraph with some content about the topic.</p>
          <p>Second paragraph continuing the discussion.</p>

          <!-- Individual image figure nested inside the outer figure -->
          <figure class="inline-image">
            <img alt="A diagram" height="400" src="https://example.com/diagram.png" width="640">
          </figure>

          <p>Third paragraph after the image.</p>
          <p>Fourth paragraph wrapping up the section.</p>
        </div>
      </figure>
    
    <div class="author-bio">
      <p>Author Name</p>
      <p>Author bio goes here.</p>
    </div>
  </article>
