name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  deployments: write

jobs:
  benchmark:
    name: Performance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: cargo bench --bench extraction -- --output-format bencher | tee output.txt

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: decruft benchmarks
          tool: cargo
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
          # Store in gh-pages under /bench/ path to avoid conflicts
          # with the docs site (which uses GitHub Actions deployment)
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
