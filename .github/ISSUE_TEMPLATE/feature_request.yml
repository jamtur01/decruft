name: Feature request
description: Suggest a new extractor or feature
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature or site extractor would you like?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why do you need this? What are you trying to extract?
  - type: input
    id: example-url
    attributes:
      label: Example URL
      description: A URL where the current extraction is insufficient
      placeholder: https://example.com
